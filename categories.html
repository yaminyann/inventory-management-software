<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - NextWeb Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Hind+Siliguri:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-50 text-slate-900">
    <div id="app-layout">
        <!-- Header Section -->
        <div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Product Categories</h2>
                <p class="text-sm text-slate-500 mt-1">Manage and organize your products into groups</p>
            </div>
            <button onclick="openCategoryModal()"
                class="flex items-center justify-center gap-2 bg-primary-600 hover:bg-primary-700 text-white px-6 py-3 rounded-2xl font-bold transition-all transform hover:scale-[1.02] active:scale-95 custom-shadow">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Create New Category
            </button>
        </div>

        <!-- Filters & Search -->
        <div
            class="bg-white p-4 rounded-2xl border border-slate-200 mb-6 custom-shadow flex flex-wrap items-center justify-between gap-4">
            <div class="relative w-full md:w-96">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </span>
                <input type="text" placeholder="Search categories..."
                    class="block w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:bg-white focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 transition-all">
            </div>
        </div>

        <!-- Categories Table -->
        <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden custom-shadow">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-100">
                            <th class="py-4 px-6 text-xs font-bold text-slate-500 uppercase tracking-widest">Category
                                Name</th>
                            <th class="py-4 px-6 text-xs font-bold text-slate-500 uppercase tracking-widest">Products
                            </th>
                            <th
                                class="py-4 px-6 text-xs font-bold text-slate-500 uppercase tracking-widest text-center">
                                Status</th>
                            <th class="py-4 px-6 text-xs font-bold text-slate-500 uppercase tracking-widest text-right">
                                Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        <!-- Sample Data -->
                        <tr class="hover:bg-slate-50/50 transition-colors group">
                            <td class="py-4 px-6">
                                <div class="flex items-center gap-3">
                                    <div
                                        class="w-10 h-10 rounded-xl bg-orange-100 text-orange-600 flex items-center justify-center font-bold">
                                        S</div>
                                    <div>
                                        <p class="font-bold text-slate-800">Spices & Masala</p>
                                        <p class="text-[10px] text-slate-400 uppercase tracking-tight font-medium">
                                            Internal ID: CAT-001</p>
                                    </div>
                                </div>
                            </td>
                            <td class="py-4 px-6">
                                <span class="text-sm font-semibold text-slate-600">42 Products</span>
                            </td>
                            <td class="py-4 px-6 text-center">
                                <span
                                    class="bg-emerald-50 text-emerald-600 px-2.5 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider">Active</span>
                            </td>
                            <td class="py-4 px-6 text-right">
                                <div
                                    class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button
                                        class="p-2 text-slate-400 hover:text-primary-600 hover:bg-primary-50 rounded-lg transition-colors"
                                        title="Edit">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                                            </path>
                                        </svg>
                                    </button>
                                    <button
                                        class="p-2 text-slate-400 hover:text-alert hover:bg-alert-bg/10 rounded-lg transition-colors"
                                        title="Delete">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                                            </path>
                                        </svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <!-- More rows... -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add Category Modal -->
        <div id="category-modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 hidden">
            <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeCategoryModal()"></div>
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md relative z-10 transform scale-95 transition-transform"
                id="category-modal-panel">
                <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                    <h3 class="text-lg font-bold text-slate-800">Add New Category</h3>
                    <button onclick="closeCategoryModal()" class="text-slate-400 hover:text-slate-600" title="Close">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="p-6 space-y-4">
                    <div>
                        <label for="cat-name" class="block text-sm font-medium text-slate-700 mb-1">Category Name
                            *</label>
                        <input type="text" id="cat-name" placeholder="e.g. Beverages"
                            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 text-sm">
                    </div>
                    <div>
                        <label for="cat-desc" class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                        <textarea id="cat-desc" rows="3" placeholder="Category details..."
                            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 text-sm"></textarea>
                    </div>
                </div>
                <div class="px-6 py-4 border-t border-slate-100 flex items-center justify-end gap-3">
                    <button type="button" onclick="closeCategoryModal()"
                        class="px-6 py-2.5 text-sm font-bold text-slate-500 hover:bg-slate-50 rounded-xl transition-colors font-bn">বাতিল
                        করুন</button>
                    <button type="button" onclick="saveCategory()"
                        class="px-8 py-2.5 text-sm font-bold text-white bg-primary-600 hover:bg-primary-700 custom-shadow rounded-xl transition-colors">Save
                        Category</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/state.js"></script>
    <script src="js/app.js"></script>
    <script src="js/layout.js"></script>
    <script>
        function openCategoryModal() {
            const modal = document.getElementById('category-modal');
            const panel = document.getElementById('category-modal-panel');
            modal.classList.remove('hidden');
            setTimeout(() => {
                panel.classList.remove('scale-95');
                panel.classList.add('scale-100');
            }, 10);
        }

        function closeCategoryModal() {
            const modal = document.getElementById('category-modal');
            const panel = document.getElementById('category-modal-panel');
            panel.classList.remove('scale-100');
            panel.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        function saveCategory() {
            const name = document.getElementById('cat-name').value;
            if (!name) {
                appLayout.showToast('Please enter category name', 'error');
                return;
            }
            appLayout.showToast('Category created successfully!', 'success');
            closeCategoryModal();
        }
    </script>
</body>

</html>
