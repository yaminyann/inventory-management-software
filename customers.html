<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers | NextWeb Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-50">
    <div id="app-layout">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
            <div>
                <h2 class="text-xl font-bold text-slate-800 tracking-tight">Customers</h2>
                <p class="text-sm text-slate-500 mt-0.5">Manage customer profiles and dues</p>
            </div>
            <button
                class="px-5 py-2.5 whitespace-nowrap bg-primary-600 text-white font-semibold rounded-xl text-sm transition-colors hover:bg-primary-700 custom-shadow flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                </svg>
                Add Customer
            </button>
        </div>

        <div class="bg-white rounded-2xl custom-shadow border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead>
                        <tr
                            class="bg-slate-50 border-b border-slate-100 text-slate-500 text-xs uppercase tracking-wider">
                            <th class="py-3 px-6 font-medium">Customer Info</th>
                            <th class="py-3 px-6 font-medium">Contact</th>
                            <th class="py-3 px-6 font-medium">Total Spent</th>
                            <th class="py-3 px-6 font-medium text-right">Due Amount</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm divide-y divide-slate-50">
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="py-4 px-6">
                                <p class="font-semibold text-slate-800">Abul Kalam</p>
                                <p class="text-xs text-slate-500">Since Oct 2025</p>
                            </td>
                            <td class="py-4 px-6 text-slate-600">017XXXXXXXX</td>
                            <td class="py-4 px-6 font-medium text-slate-800 font-bn">৳ 12,400</td>
                            <td class="py-4 px-6 text-right font-bold text-alert font-bn">৳ 2,000</td>
                        </tr>
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="py-4 px-6">
                                <p class="font-semibold text-slate-800">Walk-in Customer</p>
                                <p class="text-xs text-slate-500">General</p>
                            </td>
                            <td class="py-4 px-6 text-slate-600">-</td>
                            <td class="py-4 px-6 font-medium text-slate-800 font-bn">৳ 145,900</td>
                            <td class="py-4 px-6 text-right font-medium text-success font-bn">৳ 0.0</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="js/state.js"></script>
    <script src="js/app.js"></script>
    <script src="js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => window.appState.requireAuth());
    </script>
</body>

</html>
