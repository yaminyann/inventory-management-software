<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase | NextWeb Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-50">
    <div id="app-layout">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
            <div>
                <h2 class="text-xl font-bold text-slate-800 tracking-tight">Purchase Invoices</h2>
                <p class="text-sm text-slate-500 mt-0.5">Manage stock purchases from suppliers</p>
            </div>
            <button
                class="px-5 py-2 whitespace-nowrap bg-primary-600 text-white font-semibold rounded-xl text-sm transition-colors hover:bg-primary-700 custom-shadow flex items-center gap-2 w-full sm:w-auto justify-center">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                </svg>
                New Purchase
            </button>
        </div>
        <div
            class="bg-white rounded-2xl custom-shadow border border-slate-100 p-8 text-center flex flex-col items-center justify-center min-h-[400px]">
            <div class="w-16 h-16 rounded-full bg-slate-50 flex items-center justify-center mb-4 text-slate-400">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 11v9h-2v-9h-4v9h-2v-9H7v9H5v-9H3v-2h18v2h-2z"></path>
                </svg>
            </div>
            <h3 class="text-lg font-bold text-slate-800 mb-2">No purchases yet</h3>
            <p class="text-slate-500 text-sm max-w-sm">When you buy stock from suppliers, the invoices and due
                management will appear here.</p>
        </div>
    </div>
    <script src="js/state.js"></script>
    <script src="js/app.js"></script>
    <script src="js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => window.appState.requireAuth());
    </script>
</body>

</html>
